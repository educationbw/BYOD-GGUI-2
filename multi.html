<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>G.GUI — Multi-Game Websites</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <link rel="icon" type="image/png" href="assets/img/favicon.png" />
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/main.css">

  <style>
    html, body {
      height: 100%;
      margin: 0;
      background: #000;
      font-family: 'Orbitron', sans-serif;
      overflow: hidden;
      cursor: none;
    }

    #bgCanvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      pointer-events: none;
    }

    .custom-cursor {
      position: fixed;
      width: 18px;
      height: 18px;
      border: 2px solid #00ffff;
      border-radius: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
      z-index: 10000;
      box-shadow: 0 0 12px #00ffffaa;
      transition: transform 0.08s ease-out, width 0.2s, height 0.2s;
    }

    .page {
      position: absolute;
      top: 60px;
      left: 0;
      right: 0;
      bottom: 0;
      padding: 40px;
      overflow-y: auto;
      z-index: 1;
    }

    h1 {
      text-align: center;
      font-size: 42px;
      margin-bottom: 40px;
      color: #9ffcff;
      text-shadow: 0 0 25px #00ffff;
    }

    .game-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 36px;
      justify-items: center;
    }

    @media (max-width: 1100px) {
      .game-grid { grid-template-columns: repeat(2, 1fr); }
    }

    @media (max-width: 700px) {
      .game-grid { grid-template-columns: 1fr; }
    }

    .game-card {
      width: 100%;
      max-width: 320px;
      background: #050505;
      border: 2px solid rgba(0,255,255,0.7);
      box-shadow: 0 0 18px rgba(0,255,255,0.4);
      cursor: none;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .game-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 0 35px rgba(0,255,255,0.9);
    }

    .game-thumb {
      width: 100%;
      aspect-ratio: 16 / 9;
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .game-thumb img {
      max-width: 90%;
      max-height: 90%;
      object-fit: contain;
    }

    .game-title {
      padding: 12px;
      text-align: center;
      font-size: 14px;
      border-top: 2px solid rgba(0,255,255,0.6);
      color: #fff;
    }

    .iframe-view {
      position: absolute;
      inset: 60px 0 0 0;
      background: #000;
      display: none;
      z-index: 100;
    }

    .iframe-view iframe { width: 100%; height: 100%; border: none; }

    .back-btn {
      position: absolute;
      top: 20px;
      left: 20px;
      z-index: 110;
      background: #000;
      color: #9ffcff;
      border: 2px solid #9ffcff;
      padding: 8px 16px;
      border-radius: 10px;
      cursor: none;
      box-shadow: 0 0 12px #00ffff;
    }
  </style>
</head>
  
<body>

<canvas id="bgCanvas"></canvas>
<div class="custom-cursor" id="cursor"></div>

<header class="top-bar">
  <a href="index.html" class="controller-home">
    <img src="assets/img/controller.svg" alt="Home">
  </a>
  <a href="https://discord.gg/AC5nAtdd" target="_blank" class="discord-btn">Discord</a>
</header>

<main class="page" id="selectorView">
  <h1>Multi-Game Websites</h1>

  <div class="game-grid">
    <div class="game-card" onclick="launchSite('https://gr4ys0n.github.io')">
      <div class="game-thumb"><img src="assets/img/gr4ys0n.png"></div>
      <div class="game-title">Gr4ys0n</div>
    </div>

    <div class="game-card" onclick="launchSite('https://tomb-of-the-mask.bitbucket.io')">
      <div class="game-thumb"><img src="assets/img/tomb.png"></div>
      <div class="game-title">Tomb of the Mask</div>
    </div>

    <div class="game-card" onclick="launchSite('https://polytrack.bitbucket.io/')">
      <div class="game-thumb"><img src="assets/img/polytrack.png"></div>
      <div class="game-title">PolyTrack</div>
    </div>

    <div class="game-card" onclick="launchSite('https://bendover111222333444.github.io/')">
      <div class="game-thumb"><img src="assets/img/bendover.png"></div>
      <div class="game-title">Bendover</div>
    </div>

    <div class="game-card" onclick="launchSite('https://classroomgame.github.io/')">
      <div class="game-thumb"><img src="assets/img/classroomgame.png"></div>
      <div class="game-title">CLSRM Games</div>
    </div>

    <div class="game-card" onclick="launchSite('https://financingforeducation.github.io')">
      <div class="game-thumb"><img src="assets/img/tgc.png"></div>
      <div class="game-title">TGC Games</div>
    </div>

    <div class="game-card" onclick="launchSite('https://classroomaccess1.github.io/')">
      <div class="game-thumb"><img src="assets/img/classroomaccess.png"></div>
      <div class="game-title">CLSRM Access Games</div>
    </div>

    <div class="game-card" onclick="launchSite('https://schoolofseattle.github.io/')">
      <div class="game-thumb"><img src="assets/img/6xhub.png"></div>
      <div class="game-title">Classroom 6X Hub</div>
    </div>

    <div class="game-card" onclick="launchSite('https://hylite1.github.io/')">
      <div class="game-thumb"><img src="assets/img/hylite.png"></div>
      <div class="game-title">Hylite</div>
    </div>

    <div class="game-card" onclick="launchSite('https://classroomaccess1.github.io/gnu/')">
      <div class="game-thumb"><img src="assets/img/gnmath.png"></div>
      <div class="game-title">Gnmath</div>
    </div>
  </div>
</main>

<div class="iframe-view" id="iframeView">
  <button class="back-btn" onclick="closeIframe()">← Back</button>
  <iframe id="siteFrame"></iframe>
</div>

<script>
  const canvas = document.getElementById("bgCanvas");
  const ctx = canvas.getContext("2d");
  const cursor = document.getElementById("cursor");
  let mouse = { x: -1000, y: -1000 };

  function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
  }
  window.addEventListener("resize", resize);
  resize();

  document.addEventListener("mousemove", (e) => {
    mouse.x = e.clientX;
    mouse.y = e.clientY;
    cursor.style.left = e.clientX + "px";
    cursor.style.top = e.clientY + "px";
  });

  document.addEventListener("mousedown", () => {
    cursor.style.transform = "translate(-50%, -50%) scale(0.7)";
  });

  document.addEventListener("mouseup", () => {
    cursor.style.transform = "translate(-50%, -50%) scale(1)";
  });

  const spacing = 40;
  const radius = 150;
  const baseSize = 1.5;

  function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    for (let x = 0; x < canvas.width; x += spacing) {
      for (let y = 0; y < canvas.height; y += spacing) {
        const dx = mouse.x - x;
        const dy = mouse.y - y;
        const distance = Math.sqrt(dx*dx + dy*dy);
        let size = baseSize;
        if (distance < radius) {
          const intensity = 1 - (distance / radius);
          size = baseSize + intensity * 4;
        }
        ctx.beginPath();
        ctx.arc(x, y, size, 0, Math.PI * 2);
        ctx.fillStyle = "rgba(0, 255, 255, 0.12)";
        ctx.fill();
      }
    }
    requestAnimationFrame(draw);
  }
  draw();

  const interactive = document.querySelectorAll("a, button, .game-card");
  interactive.forEach(el => {
    el.addEventListener("mouseenter", () => {
      cursor.style.width = "28px";
      cursor.style.height = "28px";
      cursor.style.boxShadow = "0 0 20px #00ffff";
    });
    el.addEventListener("mouseleave", () => {
      cursor.style.width = "18px";
      cursor.style.height = "18px";
      cursor.style.boxShadow = "0 0 12px #00ffffaa";
    });
  });

  function launchSite(url) {
    document.getElementById('selectorView').style.display = 'none';
    document.getElementById('iframeView').style.display = 'block';
    document.getElementById('siteFrame').src = url;
  }

  function closeIframe() {
    document.getElementById('siteFrame').src = '';
    document.getElementById('iframeView').style.display = 'none';
    document.getElementById('selectorView').style.display = 'block';
  }
</script>

</body>
</html>
