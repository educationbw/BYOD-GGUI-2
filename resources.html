<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>G.GUI — Resources</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="icon" type="image/png" href="assets/img/favicon.png">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/main.css">
  <link rel="stylesheet" href="assets/css/pages.css">

  <style>
    :root {
      --side-width: 80px;
      --side-expand: 240px;
    }

    html, body {
      height: 100%;
      margin: 0;
      background: #000;
      font-family: 'Orbitron', sans-serif;
      overflow: hidden;
      cursor: none;
      transition: padding-left 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    }

    /* Force Font on all interactive elements */
    button, a, span, h2, h3 {
      font-family: 'Orbitron', sans-serif !important;
    }

    #bgCanvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      pointer-events: none;
    }

    .static-bg-layer {
      position: fixed;
      inset: 0;
      background: url('assets/img/bg-static.png') no-repeat center center;
      background-size: cover;
      display: none;
      z-index: -1;
    }
    body.use-static .static-bg-layer { display: block; }
    body.use-static #bgCanvas { display: none; }

    body.cursor-off { cursor: auto !important; }
    body.cursor-off .custom-cursor { display: none !important; }

    .custom-cursor {
      position: fixed;
      width: 18px;
      height: 18px;
      border: 2px solid #00ffff;
      border-radius: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
      z-index: 20000; /* Higher than settings panel */
      box-shadow: 0 0 12px #00ffffaa;
      transition: transform 0.08s ease-out, width 0.2s, height 0.2s;
    }

    /* Sidebar UI */
    .side-nav {
      position: fixed;
      left: calc(var(--side-width) * -1.2);
      top: 0;
      bottom: 0;
      width: var(--side-width);
      background: rgba(5, 5, 5, 0.95);
      border-right: 1px solid rgba(0, 255, 231, 0.3);
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      padding: 20px 15px;
      gap: 15px;
      z-index: 13000;
      transition: left 0.4s cubic-bezier(0.16, 1, 0.3, 1), width 0.3s cubic-bezier(0.16, 1, 0.3, 1);
      overflow: hidden;
    }
    .side-nav:hover { width: var(--side-expand); }

    .side-item {
      width: 100%;
      height: 50px;
      min-height: 50px;
      border-radius: 12px;
      background: #111;
      display: flex;
      align-items: center;
      justify-content: flex-start;
      border: 1px solid rgba(255,255,255,0.1);
      transition: all 0.2s ease;
      cursor: none;
      text-decoration: none;
      padding: 0 13px;
      white-space: nowrap;
      color: #fff;
    }
    
    .side-item img, .side-item svg { 
      width: 24px; 
      height: 24px; 
      min-width: 24px; 
      opacity: 0.8;
      transition: opacity 0.3s ease;
    }

    .side-item span {
      margin-left: 20px;
      font-size: 14px;
      opacity: 0;
      transition: opacity 0.2s ease;
    }
    .side-nav:hover .side-item span { opacity: 1; }
    
    .side-item:hover { 
      border-color: #00ffff; 
      box-shadow: 0 0 15px rgba(0, 255, 255, 0.4); 
      transform: translateX(5px); 
    }

    body.sidebar-mode { padding-left: var(--side-width); }
    body.sidebar-mode .side-nav { left: 0; }
    body.sidebar-mode .top-bar { display: none !important; }

    /* Settings Icon Button */
    .icon-btn {
      background: none;
      border: none;
      color: rgba(255, 255, 255, 0.7);
      cursor: none;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 5px;
      transition: all 0.3s ease;
    }
    .icon-btn:hover {
      color: #00ffff;
      transform: rotate(45deg) scale(1.1);
      filter: drop-shadow(0 0 8px #00ffff);
    }

    .top-link {
      padding: 8px 18px;
      border: 2px solid rgba(0,255,255,0.8);
      border-radius: 10px;
      color: #9ffcff;
      text-decoration: none;
      font-size: 14px;
      box-shadow: 0 0 12px rgba(0,255,255,0.4);
    }

    .resources-page {
      position: relative;
      height: calc(100% - 60px);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 40px;
      z-index: 1;
    }

    .resources-title {
      font-size: 42px;
      color: #9ffcff;
      text-shadow: 0 0 30px #00ffff;
    }

    .resource-btn {
      padding: 24px 64px;
      font-size: 18px;
      border-radius: 16px;
      border: 2px solid rgba(0,255,255,0.9);
      background: #050505;
      color: #9ffcff;
      cursor: none;
      text-decoration: none;
      box-shadow: 0 0 20px rgba(0,255,255,0.6);
      transition: 0.25s ease;
    }
    .resource-btn:hover {
      box-shadow: 0 0 40px rgba(0,255,255,1);
      transform: translateY(-2px);
    }

    /* Settings UI */
    .settings-panel {
      position: fixed;
      top: 0;
      right: -400px;
      width: 350px;
      height: 100%;
      background: rgba(5, 5, 5, 0.98);
      backdrop-filter: blur(20px);
      border-left: 2px solid #00ffff;
      z-index: 16000;
      transition: right 0.4s cubic-bezier(0.16, 1, 0.3, 1);
      padding: 30px;
      display: flex;
      flex-direction: column;
      gap: 25px;
    }
    .settings-panel.open { right: 0; }
    .close-settings-btn { background: none; border: none; color: #fff; font-size: 32px; cursor: none !important; }
    
    .switch { position: relative; display: inline-block; width: 44px; height: 22px; }
    .switch input { opacity: 0; width: 0; height: 0; }
    .slider { position: absolute; inset: 0; background-color: #333; transition: .4s; border-radius: 22px; cursor: none !important; }
    .slider:before { position: absolute; content: ""; height: 16px; width: 16px; left: 3px; bottom: 3px; background-color: white; transition: .4s; border-radius: 50%; }
    input:checked + .slider { background-color: #00ffff; }
    input:checked + .slider:before { transform: translateX(22px); }

    .bg-opt { border: 2px solid transparent; border-radius: 12px; background: #111; padding: 8px; text-align: center; transition: 0.2s; cursor: none !important; }
    .bg-opt.active { border-color: #00ffff; box-shadow: 0 0 10px #00ffff; }
  </style>
</head>

<body>

<canvas id="bgCanvas"></canvas>
<div class="static-bg-layer" id="staticBg"></div>
<div class="custom-cursor" id="cursor"></div>

<nav class="side-nav" id="sideNav">
  <a href="index.html" class="side-item"><img src="assets/img/controller.svg" alt="Home"><span>Home</span></a>
  <a href="multi.html" class="side-item"><img src="assets/img/grid.svg" alt="Multi"><span>Mlti-Gme Websites</span></a>
  <a href="single.html" class="side-item"><img src="assets/img/square.svg" alt="Single"><span>1-Gme Websites</span></a>
  <a href="app.html" class="side-item"><img src="assets/img/square.svg" alt="Apps"><span>Apps</span></a>
  <a href="extras.html" class="side-item"><img src="assets/img/extras.png" alt="Extras"><span>Extras</span></a>
  <a href="resources.html" class="side-item"><img src="assets/img/resources.png" alt="Res"><span>Resources</span></a>
  <a href="G.GUI - Games/game.html" class="side-item"><img src="assets/img/game.png" alt="Games"><span>Games</span></a>
  <div style="flex-grow: 1;"></div>
  
  <button class="side-item" id="sideSettingsBtn" style="background:#111;">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="12" r="3"></circle>
      <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
    </svg>
    <span>Settings</span>
  </button>
</nav>

<div class="settings-panel" id="settingsPanel">
  <div class="settings-header" style="display:flex; justify-content: space-between; align-items: center;">
    <h2 style="color: #00ffff; font-size: 20px;">SETTINGS</h2>
    <button class="close-settings-btn" id="closeSettings">&times;</button>
  </div>
  <div class="settings-section">
    <h3 style="color:#9ffcff; font-size:12px; opacity:0.6; letter-spacing:2px;">Layout</h3>
    <div style="display:flex; justify-content: space-between; align-items:center; margin-top:10px;">
      <span>Sidebar Mode</span>
      <label class="switch">
        <input type="checkbox" id="sidebarToggle">
        <span class="slider"></span>
      </label>
    </div>
  </div>
  <div class="settings-section">
    <h3 style="color:#9ffcff; font-size:12px; opacity:0.6; letter-spacing:2px;">Personalization</h3>
    <div style="display:flex; justify-content: space-between; align-items:center; margin-top:10px;">
      <span>Custom Cursor</span>
      <label class="switch">
        <input type="checkbox" id="cursorToggle" checked>
        <span class="slider"></span>
      </label>
    </div>
    <div style="margin-top:20px;">
      <span style="font-size: 13px; display: block; margin-bottom: 10px;">Background Mode</span>
      <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
        <div class="bg-opt active" id="optDots"><span>Dotted</span></div>
        <div class="bg-opt" id="optStatic"><span>Static</span></div>
      </div>
    </div>
  </div>
</div>

<header class="top-bar">
  <div class="top-left">
    <a href="index.html" class="controller-home">
      <img src="assets/img/controller.svg" alt="Home">
    </a>
    <span class="top-link">Resources</span>
  </div>

  <div style="display: flex; gap: 15px; align-items: center;">
    <button id="openSettings" class="icon-btn" title="Settings">
      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="3"></circle>
        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
      </svg>
    </button>
    <a href="https://discord.gg/AC5nAtdd" target="_blank" class="discord-btn">Discord</a>
  </div>
</header>

<main class="resources-page">
  <div class="resources-title">Resources</div>

  <a href="download.html" class="resource-btn">G.GUI-UGS Launcher</a>
</main>

<footer class="footer">
  <span>G.GUI Project • Resources</span>
</footer>

<script>
  const canvas = document.getElementById("bgCanvas");
  const ctx = canvas.getContext("2d");
  const cursor = document.getElementById("cursor");
  let mouse = { x: -1000, y: -1000 };

  function applySettings(s) {
    if(!s) return;
    document.body.classList.toggle('cursor-off', !s.cursor);
    document.body.classList.toggle('sidebar-mode', !!s.sidebar);
    
    if(s.bg === 'static') {
      document.body.classList.add('use-static');
      document.getElementById('optStatic')?.classList.add('active');
      document.getElementById('optDots')?.classList.remove('active');
    } else {
      document.body.classList.remove('use-static');
      document.getElementById('optDots')?.classList.add('active');
      document.getElementById('optStatic')?.classList.remove('active');
    }
    resize();
  }

  function saveOptions() {
    const settings = {
      cursor: document.getElementById('cursorToggle').checked,
      sidebar: document.getElementById('sidebarToggle').checked,
      bg: document.body.classList.contains('use-static') ? 'static' : 'dots'
    };
    localStorage.setItem('ggui_settings', JSON.stringify(settings));
    applySettings(settings);
  }

  function loadOptions() {
    const saved = localStorage.getItem('ggui_settings');
    if(saved) {
      const s = JSON.parse(saved);
      if(document.getElementById('cursorToggle')) document.getElementById('cursorToggle').checked = s.cursor;
      if(document.getElementById('sidebarToggle')) document.getElementById('sidebarToggle').checked = s.sidebar;
      applySettings(s);
    }
  }

  document.addEventListener("DOMContentLoaded", () => {
    loadOptions();
    resize();
    draw();

    const openBtns = ['openSettings', 'sideSettingsBtn'];
    openBtns.forEach(id => {
      document.getElementById(id)?.addEventListener('click', () => 
        document.getElementById('settingsPanel').classList.add('open'));
    });

    document.getElementById('closeSettings').addEventListener('click', () => 
      document.getElementById('settingsPanel').classList.remove('open'));

    document.getElementById('cursorToggle').addEventListener('change', saveOptions);
    document.getElementById('sidebarToggle').addEventListener('change', saveOptions);
    document.getElementById('optDots').addEventListener('click', () => {
      document.body.classList.remove('use-static');
      saveOptions();
    });
    document.getElementById('optStatic').addEventListener('click', () => {
      document.body.classList.add('use-static');
      saveOptions();
    });
    
    refreshInteractiveListeners();
  });

  function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
  }
  window.addEventListener("resize", resize);

  document.addEventListener("mousemove", (e) => {
    mouse.x = document.body.classList.contains('sidebar-mode') ? e.clientX - 80 : e.clientX;
    mouse.y = e.clientY;
    cursor.style.left = e.clientX + "px";
    cursor.style.top = e.clientY + "px";
  });

  document.addEventListener("mousedown", () => {
    cursor.style.transform = "translate(-50%, -50%) scale(0.7)";
  });

  document.addEventListener("mouseup", () => {
    cursor.style.transform = "translate(-50%, -50%) scale(1)";
  });

  function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    const spacing = 40;
    for (let x = 0; x < canvas.width; x += spacing) {
      for (let y = 0; y < canvas.height; y += spacing) {
        const dx = mouse.x - x;
        const dy = mouse.y - y;
        const dist = Math.sqrt(dx*dx + dy*dy);
        let size = dist < 150 ? 1.5 + (1 - dist/150) * 4 : 1.5;
        ctx.beginPath();
        ctx.arc(x, y, size, 0, Math.PI * 2);
        ctx.fillStyle = "rgba(0, 255, 255, 0.12)";
        ctx.fill();
      }
    }
    requestAnimationFrame(draw);
  }

  function refreshInteractiveListeners() {
    const interactive = document.querySelectorAll("a, button, .resource-btn, .side-item, .bg-opt, .slider");
    interactive.forEach(el => {
      el.addEventListener("mouseenter", () => {
        cursor.style.width = "28px";
        cursor.style.height = "28px";
        cursor.style.boxShadow = "0 0 20px #00ffff";
      });
      el.addEventListener("mouseleave", () => {
        cursor.style.width = "18px";
        cursor.style.height = "18px";
        cursor.style.boxShadow = "0 0 12px #00ffffaa";
      });
    });
  }
</script>

</body>
</html>
