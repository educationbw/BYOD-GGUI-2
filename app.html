<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>G.GUI — Apps</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <link rel="icon" type="image/png" href="assets/img/favicon.png" />
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@300;500&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="assets/css/main.css">
  <link rel="stylesheet" href="assets/css/pages.css">

  <style>
    :root {
      --bg-dark: #0a0a0b;
      --card-bg: rgba(255, 255, 255, 0.03);
      --card-border: rgba(255, 255, 255, 0.1);
      --accent: #00ffe7;
      --text-main: #e0e0e0;
    }

    html, body {
      height: 100%;
      margin: 0;
      /* Layered Background: 1. Dots, 2. Dark Overlay, 3. Image */
      background: 
        radial-gradient(rgba(255, 255, 255, 0.1) 1px, transparent 1px), 
        linear-gradient(rgba(10, 10, 11, 0.75), rgba(10, 10, 11, 0.75)), 
        url('image_46e6c0.png') no-repeat center center fixed;
      background-size: 32px 32px, cover, cover;
      font-family: 'Inter', sans-serif;
      color: var(--text-main);
      overflow: hidden;
      cursor: none;
    }

    /* --- CUSTOM CURSOR STYLES --- */
    .custom-cursor {
      width: 18px;
      height: 18px;
      background: var(--accent);
      border-radius: 50%;
      position: fixed;
      pointer-events: none;
      z-index: 9999;
      transform: translate(-50%, -50%);
      transition: width 0.2s, height 0.2s, transform 0.1s;
      box-shadow: 0 0 12px var(--accent);
    }

    /* --- TOP BAR --- */
    .top-bar {
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 30px;
      background: rgba(0, 0, 0, 0.85);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid var(--card-border);
      z-index: 100;
    }

    .controller-home {
      display: flex;
      align-items: center;
      transition: transform 0.2s ease;
    }

    .controller-home img {
      height: 32px;
      width: auto;
      display: block;
    }

    #backBtn {
      display: none;
      background: #111;
      border: 1px solid var(--accent);
      color: var(--accent);
      padding: 8px 16px;
      border-radius: 8px;
      font-family: 'Orbitron', sans-serif;
      font-size: 11px;
      cursor: none;
      margin-right: 20px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .discord-btn {
      padding: 8px 20px;
      border: 2px solid var(--accent);
      border-radius: 30px;
      color: #fff;
      text-decoration: none;
      font-family: 'Orbitron', sans-serif;
      font-size: 12px;
      font-weight: bold;
      transition: all 0.3s ease;
      text-transform: uppercase;
      letter-spacing: 1px;
      box-shadow: 0 0 10px rgba(0, 255, 231, 0.2);
      cursor: none;
    }

    .discord-btn:hover {
      background: var(--accent);
      color: #000;
      box-shadow: 0 0 20px var(--accent);
    }

    /* --- APP GRID --- */
    .app-shell {
      position: absolute;
      top: 64px;
      left: 0;
      right: 0;
      bottom: 0;
      overflow-y: auto;
    }

    .app-selector {
      max-width: 1200px;
      margin: 0 auto;
      padding: 60px 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .app-selector h1 {
      font-family: 'Orbitron', sans-serif;
      font-size: 32px;
      letter-spacing: 4px;
      margin-bottom: 50px;
      color: #fff;
      text-shadow: 0 0 15px rgba(0,0,0,0.8);
    }

    .app-buttons {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 20px;
      width: 100%;
    }

    .app-card {
      position: relative;
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 12px;
      padding: 30px 20px;
      text-align: center;
      transition: all 0.3s ease;
      cursor: none;
      display: flex;
      flex-direction: column;
      justify-content: center;
      min-height: 100px;
      backdrop-filter: blur(8px);
    }

    .app-card:hover {
      background: rgba(255, 255, 255, 0.08);
      border-color: var(--accent);
      transform: translateY(-5px);
    }

    .app-card span {
      font-size: 14px;
      color: #fff;
      font-weight: 500;
      pointer-events: none;
    }

    .alt-badge {
      position: absolute;
      top: 10px;
      right: 10px;
      font-size: 9px;
      padding: 2px 6px;
      border-radius: 4px;
      color: var(--accent);
      border: 1px solid var(--accent);
      background: rgba(0,0,0,0.5);
    }

    .app-view {
      position: fixed;
      inset: 64px 0 0 0;
      display: none;
      background: #000;
      z-index: 50;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: none;
    }

    /* --- MODAL --- */
    .alt-popup {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.9);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      backdrop-filter: blur(5px);
      cursor: none;
    }

    .alt-popup-content {
      background: #111;
      padding: 40px;
      border-radius: 20px;
      border: 1px solid var(--card-border);
      display: flex;
      flex-direction: column;
      gap: 12px;
      width: 90%;
      max-width: 350px;
    }

    .alt-link-btn {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      color: #fff;
      padding: 15px;
      border-radius: 8px;
      cursor: none;
      transition: 0.2s;
    }
  </style>
</head>

<body>

<div class="custom-cursor" id="cursor"></div>

<header class="top-bar">
  <div style="display: flex; align-items: center;">
    <button id="backBtn" onclick="closeApp()">← BACK</button>
    <a href="index.html" class="controller-home" title="Home">
      <img src="assets/img/controller.svg" alt="Home">
    </a>
  </div>
  <a href="https://discord.gg/AC5nAtdd" target="_blank" class="discord-btn">Discord</a>
</header>

<main class="app-shell">
  <div class="app-selector" id="appSelector">
    <h1>Apps</h1>
    <div class="app-buttons">
      <div class="app-card" onclick="launchApp('https://edu.waterloomath.com/')" data-alt="https://coolmathgames.metropolitanstaffingsolutions.com/,https://mathteachersforhire.shop/">
        <span>Truffled</span>
        <div class="alt-badge" onclick="openAlt(event, this.parentElement)">ALT</div>
      </div>
      <div class="app-card" onclick="launchApp('https://shadow-good.bostoncareercounselor.com/')"><span>Shadow Good</span></div>
      <div class="app-card" onclick="launchApp('https://highschoolmathteachers.com/')" data-alt="https://larp.now/">
        <span>Froggies Arcade</span>
        <div class="alt-badge" onclick="openAlt(event, this.parentElement)">ALT</div>
      </div>
      <div class="app-card" onclick="launchApp('https://abc.school.dovereducation.org/')"><span>Nebulo</span></div>
      <div class="app-card" onclick="launchApp('https://silvervalethegoat.graphicon.ru/')"><span>Zepto Learning 2</span></div>
      <div class="app-card" onclick="launchApp('https://pictures.about-anthony.com/')"><span>Infamous</span></div>
      <div class="app-card" onclick="launchApp('https://rooms.verandahotels.com/')"><span>Void Network</span></div>
      <div class="app-card" onclick="launchApp('https://vcsayt.blanksheetstudios.com/')"><span>Rammerhead</span></div>
      <div class="app-card" onclick="launchApp('https://math-help.blanksheetstudios.com/')"><span>Glint Browser</span></div>
      <div class="app-card" onclick="launchApp('https://family.1382.hotelconsuladoinn.com/')"><span>Luminal OS</span></div>
      <div class="app-card" onclick="launchApp('https://mathtoolseducation.allastella.it/')" data-alt="https://math5.tcloud.my/">
        <span>OverCloaked</span>
        <div class="alt-badge" onclick="openAlt(event, this.parentElement)">ALT</div>
      </div>
      <div class="app-card" onclick="launchApp('https://mall-shopping.egevad.se/')"><span>Galaxy V6</span></div>
      <div class="app-card" onclick="launchApp('https://joinergeometry.kathmandubiz.com/')"><span>Interstellar</span></div>
      <div class="app-card" onclick="launchApp('https://educationforindia.com/')"><span>Vapor V4</span></div>
      <div class="app-card" onclick="launchApp('https://cheese-tutorial-culinary-sciences.b-cdn.net/')"><span>Cheesy</span></div>
      <div class="app-card" onclick="launchApp('https://subscribevcsa.slowfactory.es/')"><span>Boredom V2</span></div>
      <div class="app-card" onclick="launchApp('http://math.nei.cl/')"><span>Reds Exploits</span></div>
      <div class="app-card" onclick="launchApp('https://travel-earth4.hotelconsuladoinn.com/')"><span>EarthHub</span></div>
      <div class="app-card" onclick="launchApp('https://educationalarts.polden.com/')"><span>Bromine</span></div>
    </div>
  </div>

  <div class="app-view" id="appView">
    <iframe id="appFrame"></iframe>
  </div>
</main>

<div class="alt-popup" id="altPopup">
  <div class="alt-popup-content" id="altContent"></div>
</div>

<script>
  const cursor = document.getElementById("cursor");

  document.addEventListener("mousemove", (e) => {
    cursor.style.left = e.clientX + "px";
    cursor.style.top = e.clientY + "px";
  });

  document.addEventListener("mousedown", () => {
    cursor.style.transform = "translate(-50%, -50%) scale(0.7)";
  });

  document.addEventListener("mouseup", () => {
    cursor.style.transform = "translate(-50%, -50%) scale(1)";
  });

  function refreshCursorListeners() {
    const interactive = document.querySelectorAll("a, button, .app-card, .alt-link-btn");
    interactive.forEach(el => {
      el.addEventListener("mouseenter", () => {
        cursor.style.width = "28px";
        cursor.style.height = "28px";
        cursor.style.background = "rgba(0, 255, 231, 0.3)";
        cursor.style.border = "1px solid var(--accent)";
      });
      el.addEventListener("mouseleave", () => {
        cursor.style.width = "18px";
        cursor.style.height = "18px";
        cursor.style.background = "var(--accent)";
        cursor.style.border = "none";
      });
    });
  }
  refreshCursorListeners();

  function launchApp(url) {
    document.getElementById('appSelector').style.display = 'none';
    document.getElementById('appView').style.display = 'block';
    document.getElementById('backBtn').style.display = 'block';
    document.getElementById('appFrame').src = url;
    document.getElementById('altPopup').style.display = 'none';
  }

  function closeApp() {
    document.getElementById('appSelector').style.display = 'flex';
    document.getElementById('appView').style.display = 'none';
    document.getElementById('backBtn').style.display = 'none';
    document.getElementById('appFrame').src = '';
  }

  function openAlt(event, parentCard) {
    event.stopPropagation();
    const altData = parentCard.getAttribute('data-alt');
    if (!altData) return;

    const links = altData.split(',');
    const popup = document.getElementById('altPopup');
    const content = document.getElementById('altContent');
    content.innerHTML = '<h2 style="font-size:14px; margin-top:0; color:#666; font-family:Orbitron;">SELECT VERSION</h2>';

    links.forEach((link, index) => {
      const btn = document.createElement('button');
      btn.className = 'alt-link-btn';
      btn.textContent = "Mirror Link " + (index + 1);
      btn.onclick = () => launchApp(link.trim());
      content.appendChild(btn);
    });

    const closeBtn = document.createElement('button');
    closeBtn.textContent = "CANCEL";
    closeBtn.className = "alt-link-btn";
    closeBtn.style.marginTop = "10px";
    closeBtn.style.color = "#666";
    closeBtn.onclick = () => popup.style.display = 'none';
    content.appendChild(closeBtn);

    popup.style.display = 'flex';
    refreshCursorListeners();
  }

  window.onclick = function(event) {
    const popup = document.getElementById('altPopup');
    if (event.target == popup) popup.style.display = "none";
  }
</script>

</body>
</html>
